<div class="flex flex-col items-center gap-6">
  <div class="flex items-end gap-3 md:gap-4">
    <div *ngFor="let tile of hand">
      <app-tile-card
        [tile]="tile"
        [value]="tileValue(tile)"
        size="lg"
        [highlight]="dangerTileId === tile.id ? 'danger' : null"
      >
      </app-tile-card>
    </div>
  </div>

  <div class="flex items-baseline gap-3">
    <span class="text-xs uppercase tracking-[0.3em] text-bone/50">
      Hand Total
    </span>

    <span class="font-display text-6xl text-gold tabular-nums">
      {{ total }}
    </span>
  </div>
</div>
