<div
  *ngIf="history.length === 0"
  style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--navy); opacity: 0.3;"
>
  No rounds yet — place your first bet
</div>

<div
  *ngIf="history.length > 0"
  style="width: 100%; overflow-x: auto; padding-bottom: 0.5rem;"
>
  <div style="display: flex; gap: 1rem; min-width: min-content;">

    <div
      *ngFor="let round of history"
      style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; flex-shrink: 0;"
    >
      <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--navy); opacity: 0.4;">
        <span>R{{ round.index }}</span>
        <span style="opacity: 0.7; font-variant-numeric: tabular-nums;">{{ round.total }}</span>
        <span *ngIf="round.bet" style="opacity: 0.4;">
          {{ round.bet === 'higher' ? '▲' : '▼' }}
        </span>
      </div>
      <div style="display: flex; gap: 4px;">
        <div
          *ngFor="let tile of round.hand"
          style="background: var(--navy); border-radius: 6px; width: 32px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;"
        >
          {{ tile.glyph }}
        </div>
      </div>
      <span
        *ngIf="round.result"
        [style.color]="round.result === 'win' ? '#3a8e5a' : round.result === 'loss' ? 'var(--coral)' : 'var(--navy)'"
        [style.border-color]="round.result === 'win' ? '#3a8e5a' : round.result === 'loss' ? 'var(--coral)' : 'var(--navy)'"
        style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; padding: 2px 8px; border-radius: 4px; border: 1px solid;"
      >
        {{ round.result }}
      </span>

    </div>

  </div>
</div>
